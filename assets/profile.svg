<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-label="Abstract network and web design illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0e1830"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#23c6a6"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="700" fill="url(#bg)"/>

  <g opacity=".55" filter="url(#blur)">
    <circle cx="200" cy="150" r="120" fill="#7c5cff"/>
    <circle cx="750" cy="200" r="150" fill="#23c6a6"/>
    <circle cx="600" cy="600" r="200" fill="#1c2a4a"/>
  </g>

  <g fill="none" stroke="rgba(234,240,255,.20)" stroke-width="2">
    <path d="M120 500 C260 300 360 300 500 500"/>
    <path d="M190 200 C400 100 500 200 700 300"/>
    <path d="M150 120 L720 120"/>
    <path d="M150 120 L150 600"/>
  </g>

  <g>
    <circle cx="500" cy="300" r="150" fill="rgba(7,11,20,.60)" stroke="rgba(255,255,255,.12)"/>
    <rect x="330" y="200" width="340" height="200" rx="18" fill="rgba(11,18,32,.80)" stroke="rgba(255,255,255,.12)"/>
    <rect x="350" y="220" width="50" height="10" rx="4" fill="url(#g)" opacity=".35"/>
    <rect x="350" y="245" width="200" height="8" rx="4" fill="rgba(234,240,255,.20)"/>
    <rect x="350" y="265" width="150" height="8" rx="4" fill="rgba(234,240,255,.12)"/>
    <rect x="350" y="305" width="80" height="8" rx="4" fill="rgba(35,198,166,.30)"/>
    <rect x="440" y="305" width="120" height="8" rx="4" fill="rgba(124,92,255,.30)"/>
  </g>

  <g stroke="url(#g)" stroke-width="3" fill="none" opacity=".85">
    <path d="M200 500 L310 400 L430 500"/>
    <path d="M200 500 L200 600"/>
    <path d="M310 400 L310 600"/>
    <path d="M430 500 L430 600"/>
    <circle cx="200" cy="500" r="6" fill="#23c6a6" stroke="none"/>
    <circle cx="310" cy="400" r="6" fill="#7c5cff" stroke="none"/>
    <circle cx="430" cy="500" r="6" fill="#7c5cff" stroke="none"/>
  </g>

  <g opacity=".55">
    <rect x="80" y="80" width="12" height="12" rx="3" fill="#7c5cff"/>
    <rect x="100" y="100" width="8" height="8" rx="2" fill="#23c6a6"/>
    <rect x="780" y="520" width="10" height="10" rx="2" fill="#eaf0ff" opacity=".35"/>
  </g>
</svg>